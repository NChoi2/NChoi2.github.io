<!--input where the user types a new item-->
<input id="user" placeholder="Enter Guest Name">
<button onclick="addItem()">ADD</button>
<br><br>
<!--input where the user types which item number to delete-->
<input id="deleteNum" placeholder="Guest Number">
<button onclick="removeItem()">REMOVE</button>
<!--Area to show messages like "list is full", or "invalid number"-->
<p id="output"></p>

<script>
////////////////////////////room 1/////////////////////////////////
    //where you put your guest names
let list = [];
//adding guests function
function addItem() {
    let item = document.getElementById("user").value.trim();
    document.getElementById("output").innerHTML = "";
    if (item === "") {
        document.getElementById("output").innerHTML = "Enter a guest name";
        return;
    }
    //if there are less than 5 people in the list, you will
    if (list.length < 5) {
        let now = new Date();
        let timestamp = now.getFullYear() + "-" +
            String(now.getMonth() + 1).padStart(2, '0') + "-" +
            String(now.getDate()).padStart(2, '0') + " " +
            now.toLocaleTimeString();
        // Store as an object
        list.push({ name: item, time: timestamp });
        document.getElementById("user").value = "";
        updateList();
    } else {
        document.getElementById("output").innerHTML = "Room is full";
    }
}
function removeItem() {
    let num = parseInt(document.getElementById("deleteNum").value);
    document.getElementById("output").innerHTML = "";
    if (num > 0 && num <= list.length) {
        list.splice(num - 1, 1);
        updateList();
    } else {
        document.getElementById("output").innerHTML = "Invalid guest number";
    }
    document.getElementById("deleteNum").value = "";
}
function updateList() {
    let ol = document.getElementById("guestlist");
    ol.innerHTML = "";
    for (let i = 0; i < list.length; i++) {
        let li = document.createElement("li");
        // Show name + timestamp
        li.textContent = list[i].name + " — Checked in at: " + list[i].time;
        ol.appendChild(li);
    }
}

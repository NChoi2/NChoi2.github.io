<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--title-->
    <title>Luxe Hotel</title>
<!--adding an image in the background of the title-->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="hc.css">
</head>

<body>
    <!--adding details into the image in the title-->
<section class="hello">
    <div class="hello-overlay">
        <h1>Luxe hotel</h1>
        <p>Where elegance meets comfort</p>
    </div>
</section>
<!--adding a gap between guest managemet and hello-->
<section class="rooms-wrapper">
    <!--adding the geust management title-->
<h2 class="section-title">Guest Management</h2>
<!--//////////////////room 1/////////////////////////////////////////-->

<!--the roomitself -->
<div class="room">
     <!-- The image of the room-->
<img src="https://images.unsplash.com/photo-1590490360182-c33d57733427" class="room-img">
 <!--The white part of the room, where theres an add function and remove stuff -->
<div class="room-content">
    <!--The name -->
<h3>Sovereign Suite</h3>
<!--inputing the guest name -->
<input id="user-1" placeholder="Enter Guest Name">
<!--the add guest button-->
<button onclick="addItem(1)">Add Guest</button>
<!--deleting guest -->
<input id="deleteNum-1" placeholder="Guest Number">
<!-- deleting guest using the number thing-->
<button onclick="removeItem(1)">Check Out</button>
<!--clear all button-->
<button onclick="clearAll(1)">Clear All</button>
<!--locking the room -->
<button onclick="toggleLock(1)" id="lockBtn-1">Lock Room</button>
<!--where the name will be shown -->
<p id="output-1"></p>
<!--where the name will show, and <ol> basically makes it into a numbered list, which will be easier when i remove guests -->
<ol id="guestlist-1"></ol>
</div>
</div>

<head>

    <title>Document</title>
    <style>
        @keyframes sun{
            0%{
                transform:rotate(30deg);
            }
            100%{
                transform:rotate(-30deg);
            }
        }
        @keyframes left1{
            0%{
                transform:translate(0,0);
            }
            99%{
                opacity:90%;
                animation-duration:10s;
            }
            100%{
                transform:translate(-430%,-90%);
                opacity:0%;
            }
        }
        /*the plate and face shows up*/
        @keyframes shows{
            0%{
                opacity:0%;
            }
            100%{
                opacity:100%;
            }
        }
        @keyframes opacity{
            0%{
                opacity:100%;
            }
            100%{
                opacity:0%;
            }
        }
        @keyframes big{
            0%{
                transform:scaleX(-1);
                opacity:0%;
            }
            100%{
                transform:scaleX(-1);
                opacity:100%;
            }
        }
        body{
            background-image: url("https://media.istockphoto.com/vectors/landscape-summer-green-fields-vector-id1206768509?k=20&m=1206768509&s=612x612&w=0&h=F_o27Ah6wTseBaIUDdcC-a8wG3QmsoOePfDTbOUGwXQ=");

            background-size:cover;
            overflow:hidden;
            margin:0;
            padding:0;
        }
        #table{

            height:40vh;
            background-repeat:no-repeat;
            background-size:cover;
            position:absolute;
            bottom:-80px;
            left:40px;
            z-index:1;

            height:13.5vh;

            background-size:cover;

            z-index:2;
            bottom:150px;
            left:530px;
            overflow:hidden;

            animation-duration:5s;
            animation-delay:4s;
            animation-fill-mode:forwards;

            height:13.5vh;
